- type: entity
  name: M83 grenade launcher
  parent: [BaseWeaponLauncher, CMBaseWeaponGun]
  id: WeaponLauncherM83
  description: A heavy, 6-shot grenade launcher used by the UNMC for area denial and big explosions.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/GrenadeLaunchers/m83.rsi
    layers:
    - state: icon
      map: [ "enum.GunVisualLayers.Base" ]
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/GrenadeLaunchers/m83.rsi
    quickEquip: true
    slots:
    - suitStorage
  - type: AmmoCounter
  - type: Gun
    fireRate: 0.23
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/grenade_launcher.ogg
    resetOnHandSelected: false
  - type: BallisticAmmoProvider
    whitelist:
      tags:
      - LauncherCompatibleGrenade
    capacity: 6
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
    proto: CMGrenadeHighExplosive
    mayTransfer: True
  - type: OnShootTriggerAmmoTimer
    delay: 1
    beepInterval: 2 # 2 beeps total (at 0 and 2)
    initialBeepDelay: 0
    beepSound:
      path: "/Audio/Effects/beep1.ogg"
      params:
        volume: 5
  - type: GunUserWhitelist
    whitelist:
      components:
      - GrenadeSpecWhitelist
  - type: Corrodible
    isCorrodible: false
  - type: AmmoFixedDistance
  - type: Wieldable
  - type: GunRequiresWield
  - type: GunShowUseDelay
  - type: UseDelay
  - type: GunIFF
  - type: RMCNameItemOnVend
    item: PrimaryGun

- type: entity
  name: M79 grenade launcher
  parent: [BaseWeaponLauncher, CMBaseWeaponGun]
  id: CMWeaponLauncherM79
  description: The M79 grenade launcher is a single-shot, shoulder-fired, break-action grenade launcher.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/GrenadeLaunchers/m79.rsi
    layers:
    - state: base
      map: [ "enum.GunVisualLayers.Base" ]
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/GrenadeLaunchers/m79.rsi
    slots:
    - Back
    - suitStorage
  - type: Gun
    fireRate: 1
    selectedMode: SemiAuto
    availableModes:
      - SemiAuto
    soundGunshot:
      path: /Audio/_RMC14/Weapons/Guns/Gunshots/m79_shoot.ogg
    resetOnHandSelected: false
  - type: BallisticAmmoProvider
    whitelist:
      tags:
      - LauncherCompatibleGrenade
    capacity: 1
    soundInsert:
      path: /Audio/_RMC14/Weapons/Guns/Reload/m79_reload.ogg
  - type: OnShootTriggerAmmoTimer
    delay: 1
    beepInterval: 2
    initialBeepDelay: 0
    beepSound:
      path: "/Audio/Effects/beep1.ogg"
      params:
        volume: 5
  - type: AmmoFixedDistance
  - type: Wieldable
  - type: GunRequiresWield
  - type: RMCNameItemOnVend
    item: PrimaryGun


- type: entity
  name: M5 RPG
  parent: [BaseWeaponLauncher, CMBaseWeaponGun]
  id: CMWeaponLauncherM5
  description: The M5 RPG is the primary anti-armor weapon of the UNCM. Used to take out light-tanks and enemy structures, the M5 RPG is a dangerous weapon with a variety of combat uses. Rockets can't be removed once loaded.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/RocketLaunchers/M5.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/RocketLaunchers/M5.rsi
    slots:
    - Back
    - suitStorage
  - type: Gun
    minAngle: 0
    maxAngle: 1
    fireRate: 1
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/rpgfire.ogg
  - type: BallisticAmmoProvider
    cycleable: false
    whitelist:
      tags:
        - CMRocket84mm
    proto: CMCartridgeRocket84HE
    capacity: 1
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
  - type: Appearance
  - type: Wieldable
  - type: GunRequiresWield
  - type: GunShowUseDelay
  - type: UseDelay
    delay: 2